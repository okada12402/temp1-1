7b speaker: \\\x22\\\x22, img: BOSS_IMAGES.legendary5, bg: null, text: \\\x22世界中の国々を巡り、その全てを深く理解した君だからこそ、この世界の崩壊を防ぐことができたのだ。\\\\n星の記憶は再び世界に深く刻み込まれ、不安定だった地場は、かつてないほどに静まり返った。\\\x22 \x7d,\\n        \x7b speaker: \\\x22\\\x22, img: BOSS_IMAGES.legendary5, bg: null, text: \\\x22そう、君が解き明かした一問一問は、単なる暗記ではない。\\\\nこの地球（ほし）の未来を繋ぎ止めるための、『絶対的な真理（アルティメット・テイル）』だったのだ！\\\x22 \x7d,\\n        \x7b speaker: \\\x22\\\x22, img: BOSS_IMAGES.legendary6, bg: null, text: \\\x22おめでとう。君はもう、ただの生徒（旅人）ではない。\\\\n全ての地理的記憶を再構築する、星の守護者\\u2015\\u2015\\\\n\\\\n『マスター・オブ・パンゲア』だ！\\\x22 \x7d\\n      \x5d;\\n\\n      startNovel(scenario, () \x3d\x3e \x7b\\n        processLootAndEnd(true);\\n      \x7d);\\n    \x7d\\n\\n    function closeTreasure() \x7b document.getElementById(\x27treasure-modal\x27).style.display\x3d\x27none\x27; checkReview(); \x7d\\n    function closeReview() \x7b document.getElementById(\x27review-modal\x27).style.display\x3d\x27none\x27; resetToTitle(); \x7d\\n\\n    function checkReview() \x7b \\n      if(mistakes.length\x3e0)\x7b \\n        document.getElementById(\x27review-list\x27).innerHTML \x3d mistakes.map(m \x3d\x3e `\\n          \x3cdiv class\x3d\\\x22review-item\\\x22\x3e\\n            \x3cimg src\x3d\\\x22$\x7bm.map\x7d\\\x22 onerror\x3d\\\x22this.style.display\x3d\x27none\x27\\\x22\x3e\\n            \x3cdiv style\x3d\\\x22display:flex; flex-direction:column;\\\x22\x3e\\n              \x3cspan style\x3d\\\x22font-weight:bold;font-size:12px;\\\x22\x3e$\x7bm.name\x7d\x3c\\\/span\x3e\\n              \x3cspan style\x3d\\\x22font-size:9px; color:#e67e22;\\\x22\x3e首都: $\x7bm.capital || \x27不明\x27\x7d\x3c\\\/span\x3e\\n            \x3c\\\/div\x3e\\n          \x3c\\\/div\x3e\\n        `).join(\x27\x27); \\n        document.getElementById(\x27review-modal\x27).style.display\x3d\x27flex\x27; \\n      \x7d else \x7b\\n        resetToTitle(); \\n      \x7d\\n    \x7d\\n    \\n    function resetToTitle() \x7b\\n      document.getElementById(\x27play-screen\x27).style.display\x3d\x27none\
